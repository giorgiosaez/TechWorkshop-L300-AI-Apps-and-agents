name: Build and Deploy to Azure Container Registry

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write .env file from secret
        env:
          ENV_CONTENT: ${{ secrets.ENV }}
        run: printf '%s' "$ENV_CONTENT" > src/.env

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/${{ github.event.repository.name }}:latest

      - name: Remove .env file
        if: always()
        run: rm -f src/.env
